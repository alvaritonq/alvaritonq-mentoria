services:
  - type: web
    name: alvaritonq-mentoria
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: RENDER_DATA_DIR
        value: /data
    disk:
      name: mentoria-data
      mountPath: /data
      sizeGB: 1
